name: Build Windows Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.5'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        working-directory: flutter-app
        run: flutter pub get

      - name: Build Windows release
        working-directory: flutter-app
        run: flutter build windows --release

      - name: Zip Release
        working-directory: flutter-app
        run: powershell -Command "Compress-Archive -Path 'build/windows/runner/Release/*' -DestinationPath release-windows.zip -Force"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpn_app_windows_release
          path: flutter-app/release-windows.zip
